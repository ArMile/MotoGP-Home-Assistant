            custom_fields:
              content: |
                [[[
                  const yearEntity=states['input_select.motogp_history_season'];
                  const catEntity=states['input_select.motogp_history_category'];
                  if(!yearEntity||!catEntity) return `<div style="padding:24px;text-align:center;color:rgba(255,255,255,0.4);font-family:Roboto,sans-serif;"><div style="font-size:28px;">⚙️</div><div style="font-size:14px;margin-top:8px;">Helpers manquants</div></div>`;
