                  const cached=window._motoHistCache[cacheKey];
                  if(!cached) return `<div style="font-family:Roboto,sans-serif;">${header}<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.4);"><div style="font-size:34px;margin-bottom:14px;">⏳</div><div style="font-size:14px;">Chargement ${cat} ${year}...</div></div></div>`;
                  if(!cached.ok) return `<div style="font-family:Roboto,sans-serif;">${header}<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.4);"><div style="font-size:34px;margin-bottom:14px;">${cached.noSensor?'🏛️':'⚠️'}</div><div style="font-size:15px;font-weight:700;color:white;margin-bottom:8px;">${cat} ${year}</div><div style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6;">${cached.noSensor?'Non disponible.<br><span style="color:#4fc3f7;">Sélectionne 2019–2026.</span>':'Données indisponibles.<br>Clique ↻ pour réessayer.'}</div></div></div>`;
                  const entries=cached.data.classification||[];
                  if(!entries.length) return `<div style="font-family:Roboto,sans-serif;">${header}<div style="padding:24px;text-align:center;color:rgba(255,255,255,0.3);font-size:14px;">Aucune donnée pour ${cat} ${year}</div></div>`;
                  const isFR=e=>e.rider?.country?.iso==='FR'; const leaderPts=entries[0]?.points||1;
                  const renderRow=entry=>{
                    const rank=entry.position||'—';const pts=entry.points??'—';const wins=entry.race_wins??0;
                    const name=entry.rider?.full_name||'—';const short=name.split(' ').pop().toUpperCase();
                    const team=entry.team?.name||'';const fr=isFR(entry);const r=parseInt(rank)||99;
                    const rc=r===1?'#ffd700':r===2?'#c0c0c0':r===3?'#cd7f32':r<=10?'#4fc3f7':'#a9b1d6';
                    const rs=fr?'background:linear-gradient(90deg,rgba(0,85,164,0.15),rgba(239,65,53,0.1));':'';
                    const ns=fr?'font-weight:900;color:#fff;':'font-weight:600;color:rgba(255,255,255,0.9);';
                    const barW=Math.round((parseFloat(pts)||0)/leaderPts*100);
                    return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);${rs}"><td style="width:40px;padding:7px 12px;font-weight:800;color:${rc};border-left:3px solid ${rc};font-size:15px;">${rank}</td><td style="padding:7px 6px;max-width:170px;"><div style="display:flex;align-items:center;gap:6px;">${fr?'<span style="font-size:14px;">🇫🇷</span>':''}<span style="${ns}font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:130px;">${short}</span></div><div style="width:${barW}%;height:2px;background:${accent};border-radius:1px;margin-top:2px;opacity:0.5;"></div></td><td style="padding:7px 6px;font-size:12px;color:rgba(255,255,255,0.35);max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${team}</td><td style="padding:7px 6px;text-align:center;color:rgba(255,255,255,0.5);font-size:14px;">${wins>0?wins+'V':''}</td><td style="padding:7px 14px;text-align:right;font-weight:800;color:white;font-size:15px;">${pts}</td></tr>`;
                  };
