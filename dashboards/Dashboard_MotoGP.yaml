                    const rs=fr?'background:linear-gradient(90deg,rgba(0,85,164,0.15),rgba(239,65,53,0.1));':'';
                    const ns=fr?'font-weight:900;color:#fff;':'font-weight:600;color:rgba(255,255,255,0.9);';
                    return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);${rs}"><td style="width:40px;padding:8px 12px;font-weight:800;color:${rc};border-left:3px solid ${rc};font-size:16px;">${rank}</td><td style="padding:8px 6px;max-width:160px;"><div style="display:flex;align-items:center;gap:6px;">${fr?'<span style="font-size:14px;">🇫🇷</span>':''}<span style="${ns}font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:120px;">${short}</span></div></td><td style="padding:8px 6px;text-align:center;"><div style="width:12px;height:12px;border-radius:50%;background:${color};display:inline-block;"></div></td><td style="padding:8px 6px;text-align:center;color:rgba(255,255,255,0.5);font-size:14px;">${wins>0?wins:''}</td><td style="padding:8px 14px;text-align:right;font-weight:800;color:white;font-size:16px;">${pts}</td></tr>`;
                  };
                  const top10=entries.slice(0,10);const rest=entries.slice(10);
                  let exp='';if(rest.length)exp=`<details onpointerdown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()" style="outline:none;"><summary style="cursor:pointer;text-align:center;display:block;color:rgba(255,255,255,0.6);padding:8px 12px;font-size:13px;font-weight:700;background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.1);outline:none;">▼ TOUT LE CLASSEMENT ▼</summary><table width="100%" style="border-collapse:collapse;color:white;font-family:Roboto,sans-serif;">${rest.map(e=>rR(e)).join('')}</table></details>`;
                  return `<div style="font-family:Roboto,sans-serif;"><div style="padding:16px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;"><div style="display:flex;align-items:center;gap:14px;"><div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#ff6600,#cc3300);display:flex;align-items:center;justify-content:center;font-size:22px;">🏆</div><div><div style="font-size:18px;font-weight:800;color:white;text-transform:uppercase;">MotoGP · Pilotes</div><div style="font-size:12px;color:rgba(255,255,255,0.4);">Championnat 2026</div></div></div>${frTop.length?`<div style="font-size:13px;color:#4fc3f7;">🇫🇷 ${frTop.map(e=>'P'+e.position).join(' · ')}</div>`:''}</div><table width="100%" style="border-collapse:collapse;text-align:left;color:white;font-family:Roboto,sans-serif;"><tr style="border-bottom:2px solid rgba(255,255,255,0.12);font-size:12px;text-transform:uppercase;color:rgba(255,255,255,0.35);"><th style="padding:7px 12px;width:40px;">#</th><th style="padding:7px 6px;">Pilote</th><th style="padding:7px 6px;text-align:center;width:30px;">🏍</th><th style="padding:7px 6px;text-align:center;width:30px;">V</th><th style="padding:7px 14px;text-align:right;width:48px;">Pts</th></tr>${top10.map(e=>rR(e)).join('')}</table>${exp}</div>`;
                ]]]

          - type: custom:button-card
            show_name: false
            show_icon: false
            tap_action:
              action: none
            styles:
              card:
                - background: rgba(20,27,38,0.6)
                - backdrop-filter: blur(10px)
                - border-radius: 20px
                - border: 1px solid rgba(255,255,255,0.1)
