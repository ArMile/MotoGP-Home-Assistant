                  }
                  if(!sensorMap[year]&&!window._motoHistCache[cacheKey]){window._motoHistCache[cacheKey]={ok:false,noSensor:true};}
                  const categories=['MotoGP','Moto2','Moto3']; const years=Object.keys(sensorMap).sort((a,b)=>b-a);
                  const catAccent={MotoGP:'#ff6600',Moto2:'#8e44ad',Moto3:'#00a651'}; const accent=catAccent[cat]||'#ff6600';
                  const accentRgb=accent==='#ff6600'?'255,102,0':accent==='#8e44ad'?'142,68,173':'0,166,81';
                  const yearBtns=years.map(y=>`<button onclick="event.stopPropagation();_motoHistSelectYear('${y}')" style="padding:6px 13px;border-radius:12px;border:1px solid ${y===year?accent:'rgba(255,255,255,0.15)'};background:${y===year?accent:'transparent'};color:${y===year?'white':'rgba(255,255,255,0.6)'};font-size:13px;font-weight:${y===year?'800':'600'};cursor:pointer;font-family:Roboto,sans-serif;">${y}</button>`).join('');
                  const catBtns=categories.map(c=>`<button onclick="event.stopPropagation();_motoHistSelectCat('${c}')" style="padding:6px 15px;border-radius:12px;border:1px solid ${c===cat?catAccent[c]:'rgba(255,255,255,0.15)'};background:${c===cat?catAccent[c]:'transparent'};color:${c===cat?'white':'rgba(255,255,255,0.6)'};font-size:13px;font-weight:${c===cat?'800':'600'};cursor:pointer;font-family:Roboto,sans-serif;">${c}</button>`).join('');
                  const header=`<div style="padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.08);background:linear-gradient(135deg,rgba(${accentRgb},0.15) 0%,transparent 60%);">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                      <div style="display:flex;align-items:center;gap:14px;"><div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,${accent},${accent}aa);display:flex;align-items:center;justify-content:center;font-size:22px;">📅</div><div><div style="font-size:18px;font-weight:800;color:white;text-transform:uppercase;">Historique</div><div style="font-size:12px;color:rgba(255,255,255,0.4);">${cat} · Saison ${year}</div></div></div>
                      <button onclick="event.stopPropagation();_motoHistRefresh('${cacheKey}')" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:rgba(255,255,255,0.6);font-size:14px;padding:6px 14px;cursor:pointer;font-family:Roboto,sans-serif;">↻</button>
                    </div>
