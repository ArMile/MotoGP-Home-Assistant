                  if(!window._motoHistCache) window._motoHistCache={};
                  const year=yearEntity.state; const cat=catEntity.state; const cacheKey=`${year}_${cat}`;
                  const sensorMap={
                    '2026':{MotoGP:'sensor.motogp_rider_standings',Moto2:'sensor.moto2_rider_standings',Moto3:'sensor.moto3_rider_standings'},
                    '2025':{MotoGP:'sensor.motogp_standings_2025',Moto2:'sensor.moto2_standings_2025',Moto3:'sensor.moto3_standings_2025'},
                    '2024':{MotoGP:'sensor.motogp_standings_2024',Moto2:'sensor.moto2_standings_2024',Moto3:'sensor.moto3_standings_2024'},
                    '2023':{MotoGP:'sensor.motogp_standings_2023',Moto2:'sensor.moto2_standings_2023',Moto3:'sensor.moto3_standings_2023'},
                    '2022':{MotoGP:'sensor.motogp_standings_2022',Moto2:'sensor.moto2_standings_2022',Moto3:'sensor.moto3_standings_2022'},
                    '2021':{MotoGP:'sensor.motogp_standings_2021',Moto2:'sensor.moto2_standings_2021',Moto3:'sensor.moto3_standings_2021'},
                    '2020':{MotoGP:'sensor.motogp_standings_2020',Moto2:'sensor.moto2_standings_2020',Moto3:'sensor.moto3_standings_2020'},
                    '2019':{MotoGP:'sensor.motogp_standings_2019',Moto2:'sensor.moto2_standings_2019',Moto3:'sensor.moto3_standings_2019'},
                  };
                  window._motoHistSelectYear=y=>window._motoHass.callService('input_select','select_option',{entity_id:'input_select.motogp_history_season',option:y});
                  window._motoHistSelectCat=c=>window._motoHass.callService('input_select','select_option',{entity_id:'input_select.motogp_history_category',option:c});
                  window._motoHistRefresh=key=>{delete window._motoHistCache[key];window._motoHass.callService('input_text','set_value',{entity_id:'input_text.motogp_history_ts',value:String(Date.now())});};
                  if(sensorMap[year]){
