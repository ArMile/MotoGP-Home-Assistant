# -------------------------------------------------------------------------------------------
# Vue MotoGP — Suivi EN DIRECT
#
# INSTALLATION : Ajouter ce bloc dans ui_lovelace.yaml, sous la clé views:
#
#   views:
#     ... (vos autres vues)
#     - !include MotoGP/dashboards/motogp_live_view.yaml
#
# Cette vue s'affiche toujours mais la card Live n'apparaît
# que lorsque sensor.motogp_live est en état "IN" (session active).
# -------------------------------------------------------------------------------------------

title: MotoGP Live
path: motogp-live
icon: mdi:flag-checkered
badges: []
cards:

  # ─── Navigation retour ─────────────────────────────────────────────────────
  - !include ../cards/MOTOGP-Navigation.yaml

  # ─── Card Live : visible uniquement pendant les sessions (state = IN) ───────
  # Contient : circuit SVG animé + tableau Pos/Pilote/Équipe/Écart/Tour
  - !include ../cards/MOTOGP-Live_Session.yaml

  # ─── Hors session : afficher le prochain GP en remplacement ────────────────
  - type: conditional
    conditions:
      - condition: state
        entity: sensor.motogp_live
        state_not: IN
    card:
      type: grid
      columns: 2
      square: false
      cards:
        - !include ../cards/MOTOGP-Prochain_GP.yaml
        - !include ../cards/MOTOGP-News.yaml
