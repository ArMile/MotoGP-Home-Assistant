# -------------------------------------------------------------------------------------------
# Vue MotoGP — Classements toutes catégories + Historique
#
# INSTALLATION : Ajouter ce bloc dans ui_lovelace.yaml, sous la clé views:
#
#   views:
#     ... (vos autres vues)
#     - !include MotoGP/dashboards/motogp_categories_view.yaml
# -------------------------------------------------------------------------------------------

title: Catégories
path: motogp-categories
icon: mdi:podium
badges: []
cards:

  # ─── Navigation ────────────────────────────────────────────────────────────
  - !include ../cards/MOTOGP-Navigation.yaml

  # ─── Grille 3 colonnes : MotoGP | Moto2 | Moto3 ───────────────────────────
  - type: grid
    columns: 3
    square: false
    cards:

      # Colonne MotoGP
      - type: vertical-stack
        cards:
          - !include ../cards/MOTOGP-Classement_Pilotes.yaml
          - !include ../cards/MOTOGP-Classement_Constructeurs.yaml

      # Colonne Moto2
      - type: vertical-stack
        cards:
          - !include ../cards/MOTO2-Classement_Pilotes.yaml
          - !include ../cards/MOTO2-Classement_Constructeurs.yaml

      # Colonne Moto3
      - type: vertical-stack
        cards:
          - !include ../cards/MOTO3-Classement_Pilotes.yaml
          - !include ../cards/MOTO3-Classement_Constructeurs.yaml

  # ─── Historique par saison ─────────────────────────────────────────────────
  - !include ../cards/MOTOGP-Historique_Saison.yaml
