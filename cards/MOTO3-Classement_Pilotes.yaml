# -------------------------------------------------------------------------------------------
# ID CARD / COMPONENT DOCUMENTATION
# Integration(s) : REST (sensor.moto3_rider_standings)
# Required Custom Cards : custom:button-card
# Technical Dependencies (Full Transitive Chain) :
# - Requires Internal Entity: sensor.moto3_rider_standings
# Description : Classement pilotes Moto3 — pilotes français mis en avant
# -------------------------------------------------------------------------------------------

type: custom:button-card
show_name: false
show_icon: false
tap_action:
  action: none
styles:
  card:
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - border-radius: 20px
    - border: 1px solid rgba(255,255,255,0.1)
    - box-shadow: "0 4px 15px rgba(0,0,0,0.3)"
    - padding: 0
    - overflow: hidden
  grid:
    - grid-template-areas: '"content"'
    - grid-template-columns: 100%
  custom_fields:
    content:
      - pointer-events: auto
custom_fields:
  content: |
    [[[
      const s = states['sensor.moto3_rider_standings'];
      if (!s || !s.attributes.standings) {
        return `
          <div style="padding:24px;text-align:center;color:rgba(255,255,255,0.4);font-family:Roboto,sans-serif;">
            <div style="font-size:32px;margin-bottom:8px;">🏆</div>
            <div style="font-size:12px;">Chargement du classement Moto3...</div>
          </div>`;
      }

      // Couleurs constructeurs Moto3
      const teamColors = {
        'Honda':  '#cc0000',
        'KTM':    '#ff6b00',
        'CFMOTO': '#00a651',
        'Husqvarna': '#ff6b00',
        'GasGas': '#ff6b00',
      };

      const getTeamColor = (teamName) => {
        if (!teamName) return '#4fc3f7';
        for (const [key, color] of Object.entries(teamColors)) {
          if (teamName.includes(key)) return color;
        }
        return '#4fc3f7';
      };

      const isFrench = (entry) =>
        (entry.athlete?.flag?.href || '').toLowerCase().includes('/fra.');

      let entries = [];
      try {
        const standingsData = s.attributes.standings;
        const standingsArray = Array.isArray(standingsData) ? standingsData : [standingsData];
        entries = standingsArray[0]?.entries || [];
      } catch(e) { entries = []; }

      if (!entries.length) {
        return `<div style="padding:14px;color:rgba(255,255,255,0.3);text-align:center;font-size:12px;font-family:Roboto,sans-serif;">
          Données non disponibles</div>`;
      }

      const getStat = (stats, name) =>
        (stats || []).find(s => s.name === name)?.displayValue || '—';

      const frenchInTop = entries.filter(e => isFrench(e));

      const renderRow = (entry) => {
        const rank     = getStat(entry.stats, 'rank');
        const pts      = getStat(entry.stats, 'points');
        const wins     = getStat(entry.stats, 'wins');
        const name     = entry.athlete?.shortName || entry.athlete?.displayName || '—';
        const teamName = entry.team?.shortDisplayName || entry.team?.displayName || '';
        const logo     = entry.team?.logos?.[0]?.href || '';

        const french = isFrench(entry);
        const r = parseInt(rank) || 99;

        let rankColor = '#a9b1d6';
        if (r === 1) rankColor = '#ffd700';
        else if (r === 2) rankColor = '#c0c0c0';
        else if (r === 3) rankColor = '#cd7f32';
        else if (r <= 10) rankColor = '#4fc3f7';

        const teamColor = getTeamColor(teamName);
        const rowStyle  = french ? 'background:linear-gradient(90deg,rgba(0,85,164,0.15),rgba(239,65,53,0.1));' : '';
        const nameStyle = french ? 'font-weight:900;color:#fff;text-shadow:0 0 8px rgba(255,255,255,0.4);' : 'font-weight:600;color:rgba(255,255,255,0.9);';
        const frFlag    = french ? '<span style="font-size:12px;margin-right:2px;">🇫🇷</span>' : '';

        return `
          <tr style="border-bottom:1px solid rgba(255,255,255,0.05);${rowStyle}font-size:12.5px;">
            <td style="width:32px;padding:5px 8px;font-weight:800;color:${rankColor};
                        border-left:3px solid ${rankColor};font-size:13px;">${rank}</td>
            <td style="padding:5px 4px;max-width:130px;">
              <div style="display:flex;align-items:center;gap:4px;">
                ${frFlag}
                <span style="${nameStyle}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                  ${name}
                </span>
              </div>
              ${french ? `<div style="font-size:9px;color:rgba(255,255,255,0.35);padding-left:18px;">${teamName}</div>` : ''}
            </td>
            <td style="padding:5px 4px;text-align:center;">
              ${logo ? `<img src="${logo}" width="18" height="18" style="background:white;border-radius:50%;padding:1px;vertical-align:middle;">` : `<div style="width:10px;height:10px;border-radius:50%;background:${teamColor};display:inline-block;vertical-align:middle;"></div>`}
            </td>
            <td style="padding:5px 4px;text-align:center;color:rgba(255,255,255,0.5);font-size:11px;">${wins !== '—' ? wins : ''}</td>
            <td style="padding:5px 8px;text-align:right;font-weight:800;color:white;">${pts}</td>
          </tr>`;
      };

      const top10   = entries.slice(0, 10);
      const rest    = entries.slice(10);
      const top10Rows = top10.map(e => renderRow(e)).join('');

      let expandable = '';
      if (rest.length > 0) {
        const restRows = rest.map(e => renderRow(e)).join('');
        expandable = `
          <details onpointerdown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()" style="outline:none;">
            <summary style="cursor:pointer;text-align:center;display:block;color:white;padding:5px 8px;
                            font-size:10px;font-weight:700;letter-spacing:0.5px;
                            background:rgba(255,255,255,0.03);border-radius:0 0 6px 6px;outline:none;
                            border-top:1px solid rgba(255,255,255,0.1);">
              ▼ VOIR TOUT LE CLASSEMENT ▼
            </summary>
            <table width="100%" style="border-collapse:collapse;color:white;font-family:Roboto,sans-serif;">
              ${restRows}
            </table>
          </details>`;
      }

      return `
        <div style="font-family:Roboto,sans-serif;">
          <div style="padding:12px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.08);
                      display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:32px;height:32px;border-radius:50%;
                          background:linear-gradient(135deg,#00a651,#007a3d);
                          display:flex;align-items:center;justify-content:center;font-size:16px;">🏆</div>
              <div>
                <div style="font-size:14px;font-weight:800;color:white;
                            text-transform:uppercase;letter-spacing:0.5px;">Pilotes</div>
                <div style="font-size:10px;color:rgba(255,255,255,0.4);">Championnat du Monde Moto3</div>
              </div>
            </div>
            ${frenchInTop.length > 0 ? `<div style="font-size:10px;color:#4fc3f7;">🇫🇷 ${frenchInTop.map(e => {
              const r = parseInt((e.stats||[]).find(s=>s.name==='rank')?.displayValue||'99');
              return 'P'+r;
            }).join(' · ')}</div>` : ''}
          </div>
          <table width="100%" style="border-collapse:collapse;text-align:left;color:white;font-family:Roboto,sans-serif;">
            <tr style="border-bottom:2px solid rgba(255,255,255,0.15);font-size:10px;
                        text-transform:uppercase;color:rgba(255,255,255,0.4);">
              <th style="padding:5px 8px;width:32px;">#</th>
              <th style="padding:5px 4px;">Pilote</th>
              <th style="padding:5px 4px;text-align:center;width:28px;">Moto</th>
              <th style="padding:5px 4px;text-align:center;width:28px;">V</th>
              <th style="padding:5px 8px;text-align:right;width:40px;">Pts</th>
            </tr>
            ${top10Rows}
          </table>
          ${expandable}
        </div>`;
    ]]]
