# -------------------------------------------------------------------------------------------
# ID CARD / COMPONENT DOCUMENTATION
# Integration(s) : Generic
# Required Custom Cards : custom:button-card
# Description : Boutons de navigation entre la vue principale MotoGP et la vue Live
# -------------------------------------------------------------------------------------------

type: horizontal-stack
cards:
  - type: custom:button-card
    name: "🏍️ MotoGP"
    icon: mdi:racing-helmet
    tap_action:
      action: navigate
      navigation_path: /lovelace/motogp
    styles:
      card:
        - background: "linear-gradient(135deg, rgba(255,102,0,0.3), rgba(255,102,0,0.1))"
        - backdrop-filter: blur(10px)
        - border-radius: 12px
        - border: "1px solid rgba(255,102,0,0.4)"
        - padding: "10px 0"
      name:
        - color: white
        - font-size: 13px
        - font-weight: "700"
      icon:
        - color: "#ff6600"
        - width: 22px

  - type: custom:button-card
    name: "📡 Live"
    icon: mdi:flag-checkered
    tap_action:
      action: navigate
      navigation_path: /lovelace/motogp-live
    styles:
      card:
        - background: rgba(20, 27, 38, 0.6)
        - backdrop-filter: blur(10px)
        - border-radius: 12px
        - border: "1px solid rgba(255,255,255,0.1)"
        - padding: "10px 0"
      name:
        - color: white
        - font-size: 13px
        - font-weight: "700"
      icon:
        - color: "#ff4a4a"
        - width: 22px
