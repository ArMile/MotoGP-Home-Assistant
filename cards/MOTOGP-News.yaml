# -------------------------------------------------------------------------------------------
# ID CARD / COMPONENT DOCUMENTATION
# Integration(s) : REST sensor (rss-motogp.yaml)
# Required Custom Cards : custom:button-card
# Technical Dependencies (Full Transitive Chain) :
# - Requires Internal Entity: sensor.motogp_news
# -------------------------------------------------------------------------------------------

type: custom:button-card
show_name: false
show_icon: false
tap_action:
  action: none
styles:
  card:
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - border-radius: 20px
    - border: 1px solid rgba(255,255,255,0.1)
    - box-shadow: "0 4px 15px rgba(0,0,0,0.3)"
    - padding: 0
    - overflow: hidden
  grid:
    - grid-template-areas: '"content"'
    - grid-template-columns: 100%
  custom_fields:
    content:
      - pointer-events: auto
custom_fields:
  content: |
    [[[
      const s = states['sensor.motogp_news'];
      if (!s || !s.attributes.items) {
        return `
          <div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4);font-family:Roboto,sans-serif;">
            <div style="font-size:24px;margin-bottom:8px;">📰</div>
            Chargement des actualités...
          </div>`;
      }

      const items = s.attributes.items || [];

      const newsRows = items.slice(0, 8).map((item, i) => {
        const title = (item.title || '').replace(/ - .*$/, '').trim();
        const pubDate = item.pubDate ? new Date(item.pubDate) : null;
        const timeStr = pubDate
          ? pubDate.toLocaleDateString('fr-FR', {day: 'numeric', month: 'short'})
          : '';
        const url = item.link || item.url || '#';

        return `
          <div onclick="window.open('${url}', '_blank')"
               style="display:flex;align-items:flex-start;gap:10px;
                      padding:9px 14px;border-bottom:1px solid rgba(255,255,255,0.05);
                      cursor:pointer;transition:background 0.2s;"
               onmouseover="this.style.background='rgba(255,102,0,0.08)'"
               onmouseout="this.style.background='transparent'">
            <div style="flex-shrink:0;width:4px;height:4px;border-radius:50%;
                        background:#ff6600;margin-top:6px;box-shadow:0 0 4px #ff6600;"></div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12.5px;font-weight:600;color:white;line-height:1.4;
                          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                ${title}
              </div>
              <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;">
                ${timeStr}
              </div>
            </div>
          </div>`;
      }).join('');

      return `
        <div style="font-family:Roboto,sans-serif;">
          <div style="padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.08);
                      display:flex;align-items:center;gap:10px;">
            <div style="width:32px;height:32px;border-radius:50%;
                        background:linear-gradient(135deg,#ff6600,#cc3300);
                        display:flex;align-items:center;justify-content:center;
                        font-size:16px;flex-shrink:0;">📰</div>
            <div>
              <div style="font-size:14px;font-weight:800;color:white;
                          text-transform:uppercase;letter-spacing:0.5px;">Actualités MotoGP</div>
              <div style="font-size:10px;color:rgba(255,255,255,0.4);">Google News · FR</div>
            </div>
          </div>
          <div style="padding:4px 0;">
            ${newsRows || '<div style="padding:14px;color:rgba(255,255,255,0.3);font-size:12px;text-align:center;">Aucun article disponible</div>'}
          </div>
        </div>`;
    ]]]
