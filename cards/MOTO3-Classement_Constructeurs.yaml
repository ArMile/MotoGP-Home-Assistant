# -------------------------------------------------------------------------------------------
# ID CARD / COMPONENT DOCUMENTATION
# Integration(s) : REST (sensor.moto3_constructor_standings)
# Required Custom Cards : custom:button-card
# Technical Dependencies (Full Transitive Chain) :
# - Requires Internal Entity: sensor.moto3_constructor_standings
# Description : Classement constructeurs Moto3 avec couleurs par marque
# -------------------------------------------------------------------------------------------

type: custom:button-card
show_name: false
show_icon: false
tap_action:
  action: none
styles:
  card:
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - border-radius: 20px
    - border: 1px solid rgba(255,255,255,0.1)
    - box-shadow: "0 4px 15px rgba(0,0,0,0.3)"
    - padding: 0
    - margin-top: 8px
    - overflow: hidden
  grid:
    - grid-template-areas: '"content"'
    - grid-template-columns: 100%
  custom_fields:
    content:
      - pointer-events: auto
custom_fields:
  content: |
    [[[
      const s = states['sensor.moto3_constructor_standings'];
      if (!s || !s.attributes.standings) {
        return `
          <div style="padding:16px;text-align:center;color:rgba(255,255,255,0.4);font-family:Roboto,sans-serif;">
            <div style="font-size:11px;">Chargement constructeurs Moto3...</div>
          </div>`;
      }

      const brandColors = {
        'Honda':     { primary: '#cc0000', badge: '🔴' },
        'KTM':       { primary: '#ff6b00', badge: '🟠' },
        'CFMOTO':    { primary: '#00a651', badge: '🟢' },
        'Husqvarna': { primary: '#ff6b00', badge: '🟠' },
        'GasGas':    { primary: '#ff6b00', badge: '🟠' },
      };

      const getBrand = (name) => {
        for (const [key] of Object.entries(brandColors)) {
          if (name && name.includes(key)) return key;
        }
        return null;
      };

      let entries = [];
      try {
        const standingsData = s.attributes.standings;
        const standingsArray = Array.isArray(standingsData) ? standingsData : [standingsData];
        entries = standingsArray[0]?.entries || [];
      } catch(e) { entries = []; }

      if (!entries.length) {
        return `<div style="padding:14px;color:rgba(255,255,255,0.3);text-align:center;font-size:12px;font-family:Roboto,sans-serif;">
          Données non disponibles</div>`;
      }

      const getStat = (stats, name) =>
        (stats || []).find(s => s.name === name)?.displayValue || '—';

      const rows = entries.map((entry) => {
        const rank      = getStat(entry.stats, 'rank');
        const pts       = getStat(entry.stats, 'points');
        const wins      = getStat(entry.stats, 'wins');
        const teamName  = entry.team?.displayName || entry.team?.shortDisplayName || entry.athlete?.displayName || '—';
        const logo      = entry.team?.logos?.[0]?.href || '';
        const brand     = getBrand(teamName);
        const brandInfo = brand ? brandColors[brand] : { primary: '#4fc3f7', badge: '⚪' };

        const r = parseInt(rank) || 99;
        let rankColor = '#a9b1d6';
        if (r === 1) rankColor = '#ffd700';
        else if (r === 2) rankColor = '#c0c0c0';
        else if (r === 3) rankColor = '#cd7f32';

        const leaderPts = parseFloat(getStat(entries[0]?.stats, 'points')) || 1;
        const thisPts   = parseFloat(pts) || 0;
        const barWidth  = Math.round((thisPts / leaderPts) * 100);

        return `
          <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
            <td style="width:32px;padding:7px 8px;font-weight:800;color:${rankColor};
                        border-left:3px solid ${rankColor};font-size:13px;">${rank}</td>
            <td style="padding:7px 4px;">
              <div style="display:flex;align-items:center;gap:8px;">
                ${logo
                  ? `<img src="${logo}" width="20" height="20" style="background:white;border-radius:4px;padding:1px;">`
                  : `<div style="width:10px;height:10px;border-radius:50%;background:${brandInfo.primary};flex-shrink:0;"></div>`
                }
                <div>
                  <div style="font-size:12.5px;font-weight:700;color:white;line-height:1.2;">${teamName}</div>
                  <div style="width:${barWidth}%;height:2px;background:${brandInfo.primary};
                              border-radius:1px;margin-top:3px;opacity:0.7;
                              box-shadow:0 0 4px ${brandInfo.primary};"></div>
                </div>
              </div>
            </td>
            <td style="padding:7px 4px;text-align:center;font-size:11px;color:rgba(255,255,255,0.5);">
              ${wins !== '—' ? wins + ' V' : ''}
            </td>
            <td style="padding:7px 8px;text-align:right;font-weight:800;color:white;font-size:13px;">${pts}</td>
          </tr>`;
      }).join('');

      return `
        <div style="font-family:Roboto,sans-serif;">
          <div style="padding:10px 16px 8px;border-bottom:1px solid rgba(255,255,255,0.08);
                      display:flex;align-items:center;gap:10px;">
            <div style="width:28px;height:28px;border-radius:50%;
                        background:linear-gradient(135deg,#00a651,#007a3d);
                        display:flex;align-items:center;justify-content:center;font-size:14px;">🏭</div>
            <div>
              <div style="font-size:13px;font-weight:800;color:white;
                          text-transform:uppercase;letter-spacing:0.5px;">Constructeurs</div>
              <div style="font-size:10px;color:rgba(255,255,255,0.4);">Championnat du Monde Moto3</div>
            </div>
          </div>
          <table width="100%" style="border-collapse:collapse;text-align:left;color:white;font-family:Roboto,sans-serif;">
            <tr style="border-bottom:2px solid rgba(255,255,255,0.12);font-size:10px;
                        text-transform:uppercase;color:rgba(255,255,255,0.35);">
              <th style="padding:5px 8px;width:32px;">#</th>
              <th style="padding:5px 4px;">Constructeur</th>
              <th style="padding:5px 4px;text-align:center;width:40px;">Victoires</th>
              <th style="padding:5px 8px;text-align:right;width:40px;">Pts</th>
            </tr>
            ${rows}
          </table>
        </div>`;
    ]]]
