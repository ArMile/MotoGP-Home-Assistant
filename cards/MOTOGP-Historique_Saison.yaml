# -------------------------------------------------------------------------------------------
# ID CARD / COMPONENT DOCUMENTATION
# Integration(s) : ESPN API (fetch direct) + helpers HA
# Required Custom Cards : custom:button-card
# Required Helpers (helpers.yaml) :
#   - input_select.motogp_history_season
#   - input_select.motogp_history_category
#   - input_text.motogp_history_ts
# Description : Historique des championnats par saison et par catégorie.
#               Sélection de l'année (2019-actuelle) et de la catégorie (MotoGP/Moto2/Moto3).
#               Données chargées à la demande via fetch() sur l'API ESPN publique.
# -------------------------------------------------------------------------------------------

type: custom:button-card
show_name: false
show_icon: false
tap_action:
  action: none
styles:
  card:
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - border-radius: 20px
    - border: 1px solid rgba(255,255,255,0.1)
    - box-shadow: "0 4px 15px rgba(0,0,0,0.3)"
    - padding: 0
    - overflow: hidden
  grid:
    - grid-template-areas: '"content"'
    - grid-template-columns: 100%
  custom_fields:
    content:
      - pointer-events: auto
custom_fields:
  content: |
    [[[
      // ─── Vérification des helpers ────────────────────────────────────────────
      const yearEntity = states['input_select.motogp_history_season'];
      const catEntity  = states['input_select.motogp_history_category'];

      if (!yearEntity || !catEntity) {
        return `
          <div style="padding:24px;text-align:center;color:rgba(255,255,255,0.4);font-family:Roboto,sans-serif;">
            <div style="font-size:28px;margin-bottom:12px;">⚙️</div>
            <div style="font-size:13px;font-weight:700;color:white;margin-bottom:8px;">Helpers manquants</div>
            <div style="font-size:11px;line-height:1.6;">
              Ajouter dans <code>configuration.yaml</code> :<br>
              <code>input_select: !include MotoGP/helpers.yaml</code><br>
              <code>input_text: !include MotoGP/helpers.yaml</code>
            </div>
          </div>`;
      }

      // ─── State global (stockage hors shadow DOM) ──────────────────────────────
      if (!window._motoHass) window._motoHass = hass;
      window._motoHass = hass;

      if (!window._motoHistCache) window._motoHistCache = {};
      if (!window._motoHistFetching) window._motoHistFetching = {};

      const year    = yearEntity.state;
      const cat     = catEntity.state;
      const catSlug = { 'MotoGP': 'motogp', 'Moto2': 'moto2', 'Moto3': 'moto3' }[cat] || 'motogp';
      const cacheKey = `${year}_${catSlug}`;

      // ─── Fonctions helper globales (onclick) ─────────────────────────────────
      window._motoHistSelectYear = (y) => {
        window._motoHass.callService('input_select', 'select_option', {
          entity_id: 'input_select.motogp_history_season',
          option: y
        });
      };
      window._motoHistSelectCat = (c) => {
        window._motoHass.callService('input_select', 'select_option', {
          entity_id: 'input_select.motogp_history_category',
          option: c
        });
      };
      window._motoHistRefresh = () => {
        delete window._motoHistCache[cacheKey];
        delete window._motoHistFetching[cacheKey];
        window._motoHass.callService('input_text', 'set_value', {
          entity_id: 'input_text.motogp_history_ts',
          value: String(Date.now())
        });
      };

      // ─── Fetch si pas en cache ────────────────────────────────────────────────
      if (!window._motoHistCache[cacheKey] && !window._motoHistFetching[cacheKey]) {
        window._motoHistFetching[cacheKey] = true;
        fetch(
          `https://site.web.api.espn.com/apis/v2/sports/racing/${catSlug}/standings?season=${year}`
        )
          .then(r => r.json())
          .then(data => {
            window._motoHistCache[cacheKey] = { ok: true, data };
            window._motoHistFetching[cacheKey] = false;
            // Déclenche re-render via input_text (toujours différent)
            window._motoHass.callService('input_text', 'set_value', {
              entity_id: 'input_text.motogp_history_ts',
              value: String(Date.now())
            });
          })
          .catch(() => {
            window._motoHistCache[cacheKey] = { ok: false };
            window._motoHistFetching[cacheKey] = false;
            window._motoHass.callService('input_text', 'set_value', {
              entity_id: 'input_text.motogp_history_ts',
              value: String(Date.now())
            });
          });
      }

      // ─── Sélecteurs année / catégorie ────────────────────────────────────────
      const currentYear = new Date().getFullYear();
      const years = Array.from({ length: currentYear - 2018 }, (_, i) => String(currentYear - i));
      const categories = ['MotoGP', 'Moto2', 'Moto3'];

      const catAccent = { 'MotoGP': '#ff6600', 'Moto2': '#8e44ad', 'Moto3': '#00a651' };
      const accent = catAccent[cat] || '#ff6600';

      const yearBtns = years.map(y => `
        <button
          onclick="event.stopPropagation(); _motoHistSelectYear('${y}')"
          style="padding:4px 10px;border-radius:12px;border:1px solid ${y === year ? accent : 'rgba(255,255,255,0.15)'};
                 background:${y === year ? accent : 'transparent'};
                 color:${y === year ? 'white' : 'rgba(255,255,255,0.6)'};
                 font-size:11px;font-weight:${y === year ? '800' : '600'};cursor:pointer;
                 transition:all 0.15s;font-family:Roboto,sans-serif;">
          ${y}
        </button>`).join('');

      const catBtns = categories.map(c => `
        <button
          onclick="event.stopPropagation(); _motoHistSelectCat('${c}')"
          style="padding:4px 12px;border-radius:12px;border:1px solid ${c === cat ? catAccent[c] : 'rgba(255,255,255,0.15)'};
                 background:${c === cat ? catAccent[c] : 'transparent'};
                 color:${c === cat ? 'white' : 'rgba(255,255,255,0.6)'};
                 font-size:11px;font-weight:${c === cat ? '800' : '600'};cursor:pointer;
                 transition:all 0.15s;font-family:Roboto,sans-serif;">
          ${c}
        </button>`).join('');

      // ─── Header commun ────────────────────────────────────────────────────────
      const header = `
        <div style="padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.08);
                    background:linear-gradient(135deg,rgba(${accent === '#ff6600' ? '255,102,0' : accent === '#8e44ad' ? '142,68,173' : '0,166,81'},0.15) 0%,transparent 60%);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:32px;height:32px;border-radius:50%;
                          background:linear-gradient(135deg,${accent},${accent}aa);
                          display:flex;align-items:center;justify-content:center;font-size:16px;">📅</div>
              <div>
                <div style="font-size:14px;font-weight:800;color:white;
                            text-transform:uppercase;letter-spacing:0.5px;">Historique</div>
                <div style="font-size:10px;color:rgba(255,255,255,0.4);">${cat} · Saison ${year}</div>
              </div>
            </div>
            <button
              onclick="event.stopPropagation(); _motoHistRefresh()"
              style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
                     border-radius:8px;color:rgba(255,255,255,0.6);font-size:11px;
                     padding:4px 10px;cursor:pointer;font-family:Roboto,sans-serif;">
              ↻ Recharger
            </button>
          </div>
          <!-- Catégories -->
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            ${catBtns}
          </div>
          <!-- Années -->
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${yearBtns}
          </div>
        </div>`;

      // ─── États de chargement / erreur ─────────────────────────────────────────
      const cached = window._motoHistCache[cacheKey];

      if (!cached) {
        return `
          <div style="font-family:Roboto,sans-serif;">
            ${header}
            <div style="padding:32px;text-align:center;color:rgba(255,255,255,0.4);">
              <div style="font-size:28px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>
              <div style="font-size:12px;">Chargement ${cat} ${year}...</div>
            </div>
          </div>
          <style>@keyframes spin { to { transform:rotate(360deg); } }</style>`;
      }

      if (!cached.ok) {
        return `
          <div style="font-family:Roboto,sans-serif;">
            ${header}
            <div style="padding:32px;text-align:center;color:rgba(255,255,255,0.4);">
              <div style="font-size:28px;margin-bottom:12px;">⚠️</div>
              <div style="font-size:12px;">Erreur de chargement — données ESPN indisponibles pour ${cat} ${year}</div>
            </div>
          </div>`;
      }

      // ─── Rendu du classement ──────────────────────────────────────────────────
      let entries = [];
      try {
        const standingsArray = Array.isArray(cached.data.standings)
          ? cached.data.standings : [cached.data.standings];
        entries = standingsArray[0]?.entries || [];
      } catch(e) { entries = []; }

      if (!entries.length) {
        return `
          <div style="font-family:Roboto,sans-serif;">
            ${header}
            <div style="padding:24px;text-align:center;color:rgba(255,255,255,0.3);font-size:12px;">
              Aucune donnée disponible pour ${cat} ${year}
            </div>
          </div>`;
      }

      const getStat = (stats, name) =>
        (stats || []).find(s => s.name === name)?.displayValue || '—';

      const isFrench = (entry) =>
        (entry.athlete?.flag?.href || '').toLowerCase().includes('/fra.');

      const renderRow = (entry) => {
        const rank     = getStat(entry.stats, 'rank');
        const pts      = getStat(entry.stats, 'points');
        const wins     = getStat(entry.stats, 'wins');
        const name     = entry.athlete?.shortName || entry.athlete?.displayName || '—';
        const teamName = entry.team?.shortDisplayName || entry.team?.displayName || '';
        const logo     = entry.team?.logos?.[0]?.href || '';

        const french = isFrench(entry);
        const r = parseInt(rank) || 99;

        let rankColor = '#a9b1d6';
        if (r === 1) rankColor = '#ffd700';
        else if (r === 2) rankColor = '#c0c0c0';
        else if (r === 3) rankColor = '#cd7f32';
        else if (r <= 10) rankColor = '#4fc3f7';

        const rowStyle  = french ? 'background:linear-gradient(90deg,rgba(0,85,164,0.15),rgba(239,65,53,0.1));' : '';
        const nameStyle = french ? 'font-weight:900;color:#fff;' : 'font-weight:600;color:rgba(255,255,255,0.9);';
        const frFlag    = french ? '🇫🇷 ' : '';

        // Points bar
        const leaderPts = parseFloat(getStat(entries[0]?.stats, 'points')) || 1;
        const barW      = Math.round((parseFloat(pts) || 0) / leaderPts * 100);

        return `
          <tr style="border-bottom:1px solid rgba(255,255,255,0.05);${rowStyle}font-size:12.5px;">
            <td style="width:32px;padding:5px 8px;font-weight:800;color:${rankColor};
                        border-left:3px solid ${rankColor};font-size:13px;">${rank}</td>
            <td style="padding:5px 4px;max-width:150px;">
              <div style="display:flex;align-items:center;gap:4px;">
                <span style="${nameStyle}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                  ${frFlag}${name}
                </span>
              </div>
              <div style="width:${barW}%;height:2px;background:${accent};border-radius:1px;margin-top:3px;opacity:0.5;"></div>
            </td>
            <td style="padding:5px 4px;text-align:left;font-size:10px;color:rgba(255,255,255,0.35);
                        max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
              ${logo ? `<img src="${logo}" width="16" height="16" style="background:white;border-radius:50%;padding:1px;vertical-align:middle;margin-right:4px;">` : ''}${teamName}
            </td>
            <td style="padding:5px 4px;text-align:center;color:rgba(255,255,255,0.5);font-size:11px;">${wins !== '—' ? wins + 'V' : ''}</td>
            <td style="padding:5px 8px;text-align:right;font-weight:800;color:white;">${pts}</td>
          </tr>`;
      };

      const top10 = entries.slice(0, 10);
      const rest  = entries.slice(10);
      const top10Rows = top10.map(e => renderRow(e)).join('');

      let expandable = '';
      if (rest.length > 0) {
        const restRows = rest.map(e => renderRow(e)).join('');
        expandable = `
          <details onpointerdown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="event.stopPropagation()" style="outline:none;">
            <summary style="cursor:pointer;text-align:center;display:block;color:white;padding:5px 8px;
                            font-size:10px;font-weight:700;letter-spacing:0.5px;
                            background:rgba(255,255,255,0.03);border-radius:0 0 6px 6px;outline:none;
                            border-top:1px solid rgba(255,255,255,0.1);">
              ▼ VOIR TOUT LE CLASSEMENT (${entries.length} pilotes) ▼
            </summary>
            <table width="100%" style="border-collapse:collapse;color:white;font-family:Roboto,sans-serif;">
              ${restRows}
            </table>
          </details>`;
      }

      // Leader info
      const leader = entries[0];
      const leaderName = leader?.athlete?.shortName || leader?.athlete?.displayName || '';
      const leaderPts2 = getStat(leader?.stats, 'points');
      const leaderWins = getStat(leader?.stats, 'wins');

      return `
        <div style="font-family:Roboto,sans-serif;">
          ${header}

          <!-- Podium résumé -->
          <div style="padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.06);
                      display:flex;gap:12px;align-items:center;
                      background:linear-gradient(90deg,rgba(255,215,0,0.08),transparent);">
            <div style="font-size:22px;">🏆</div>
            <div>
              <div style="font-size:13px;font-weight:800;color:#ffd700;">${leaderName}</div>
              <div style="font-size:10px;color:rgba(255,255,255,0.4);">
                Champion ${cat} ${year} · ${leaderPts2} pts · ${leaderWins !== '—' ? leaderWins + ' victoires' : ''}
              </div>
            </div>
          </div>

          <table width="100%" style="border-collapse:collapse;text-align:left;color:white;font-family:Roboto,sans-serif;">
            <tr style="border-bottom:2px solid rgba(255,255,255,0.15);font-size:10px;
                        text-transform:uppercase;color:rgba(255,255,255,0.4);">
              <th style="padding:5px 8px;width:32px;">#</th>
              <th style="padding:5px 4px;">Pilote</th>
              <th style="padding:5px 4px;">Équipe</th>
              <th style="padding:5px 4px;text-align:center;width:28px;">V</th>
              <th style="padding:5px 8px;text-align:right;width:40px;">Pts</th>
            </tr>
            ${top10Rows}
          </table>
          ${expandable}

          <div style="padding:6px 16px;border-top:1px solid rgba(255,255,255,0.06);
                      font-size:9px;color:rgba(255,255,255,0.2);text-align:right;
                      text-transform:uppercase;letter-spacing:0.5px;">
            ESPN · ${cat} ${year} · Données archivées
          </div>
        </div>`;
    ]]]
