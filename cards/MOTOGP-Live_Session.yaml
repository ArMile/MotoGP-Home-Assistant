# -------------------------------------------------------------------------------------------
# ID CARD / COMPONENT DOCUMENTATION
# Integration(s) : REST (sensor.motogp_live)
# Required Custom Cards : custom:button-card
# Technical Dependencies (Full Transitive Chain) :
# - Requires Internal Entity: sensor.motogp_live
# Description : Suivi en direct — circuit animé (gauche) + classement live Lap/Pos/Écart (droite)
#               Affiché uniquement pendant les sessions actives (state = IN)
# -------------------------------------------------------------------------------------------

type: conditional
conditions:
  - condition: state
    entity: sensor.motogp_live
    state: IN
card:
  type: custom:button-card
  show_name: false
  show_icon: false
  tap_action:
    action: none
  styles:
    card:
      - background: "linear-gradient(135deg, rgba(10, 14, 22, 0.95), rgba(20, 27, 38, 0.9))"
      - backdrop-filter: blur(15px)
      - -webkit-backdrop-filter: blur(15px)
      - border-radius: 20px
      - border: "1px solid rgba(255,102,0,0.3)"
      - box-shadow: "0 8px 32px rgba(255,102,0,0.15)"
      - padding: 0
      - overflow: hidden
    grid:
      - grid-template-areas: '"content"'
      - grid-template-columns: 100%
    custom_fields:
      content:
        - pointer-events: auto
  extra_styles: |
    @keyframes livePulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.85); }
    }
    @keyframes bikeMove {
      0%   { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes scanLine {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(400%); }
    }
    @keyframes blinkDot {
      0%,100% { opacity:1; }
      50%      { opacity:0.2; }
    }
  custom_fields:
    content: |
      [[[
        const liveData = states['sensor.motogp_live'];
        if (!liveData || !liveData.attributes.events || !liveData.attributes.events.length) {
          return `<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4);font-family:Roboto,sans-serif;">
            <div style="font-size:28px;">📡</div>
            <div style="font-size:12px;margin-top:8px;">Connexion au live...</div>
          </div>`;
        }

        const event = liveData.attributes.events[0];

        // Session active
        const activeComp = (event.competitions || []).find(c => c.status?.type?.state === 'in')
                        || (event.competitions || []).find(c => !c.status?.type?.completed)
                        || (event.competitions || [])[0];

        if (!activeComp) {
          return `<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.4);font-family:Roboto,sans-serif;">
            <div style="font-size:28px;">🏁</div>
            <div style="font-size:12px;margin-top:8px;">Aucune session active</div>
          </div>`;
        }

        const sessionName = activeComp.name || 'Session';
        const sessionType = {
          'Practice 1':'FP1','Practice 2':'FP2','Practice 3':'FP3',
          'Qualifying 1':'Q1','Qualifying 2':'Q2','Sprint':'SPRINT',
          'Sprint Race':'SPRINT','Tissot Sprint':'SPRINT',
          'Race':'COURSE','Warm Up':'WARM UP','Free Practice':'PRACTICE',
          'Sprint Qualifying':'SPRINT Q.'
        };
        const sessionLabel = sessionType[sessionName] || sessionName.toUpperCase();
        const isRace      = sessionName === 'Race' || sessionName.includes('Sprint');
        const isQuali     = sessionName.includes('Qualifying');

        // Info circuit
        const venue  = event.venue || activeComp.venue || {};
        const country= venue.address?.country || event.location?.name || '';
        const city   = venue.address?.city || '';
        const circuit= venue.fullName || venue.name || 'Circuit';
        const gpName = (event.name || 'Grand Prix').replace(/^\d{4}\s+/, '');

        const flagMap = {
          'Qatar':'🇶🇦','Thailand':'🇹🇭','Portugal':'🇵🇹','Spain':'🇪🇸',
          'France':'🇫🇷','Italy':'🇮🇹','Germany':'🇩🇪','Netherlands':'🇳🇱',
          'United Kingdom':'🇬🇧','Great Britain':'🇬🇧','Austria':'🇦🇹',
          'United States':'🇺🇸','USA':'🇺🇸','Czech Republic':'🇨🇿',
          'San Marino':'🇸🇲','India':'🇮🇳','Japan':'🇯🇵','Indonesia':'🇮🇩',
          'Australia':'🇦🇺','Malaysia':'🇲🇾','Argentina':'🇦🇷',
          'Mexico':'🇲🇽','Kazakhstan':'🇰🇿'
        };
        const flag = flagMap[country] || '🏁';

        // Status et tour
        const clock  = activeComp.status?.displayClock || '';
        const period = activeComp.status?.period || 0;  // numéro du tour

        // Compétiteurs
        const competitors = activeComp.competitors || [];
        const frenchRiders = ['Quartararo', 'Zarco'];

        const getStat = (stats, name) =>
          (stats || []).find(s => s.name === name)?.displayValue || '';

        const riders = competitors.map(c => {
          const rankVal = getStat(c.statistics, 'rank')
                       || (c.order ? String(c.order) : '')
                       || c.score || '';
          return {
            rank:    parseInt(rankVal) || 99,
            name:    c.athlete?.shortName || c.athlete?.displayName || c.team?.shortDisplayName || '—',
            team:    c.team?.abbreviation || c.team?.shortDisplayName || '',
            logo:    c.team?.logos?.[0]?.href || '',
            flagUrl: c.athlete?.flag?.href || '',
            gap:     getStat(c.statistics, 'gapToLeader') || getStat(c.statistics, 'deficit') || getStat(c.statistics, 'time') || c.score || '',
            laps:    getStat(c.statistics, 'lapsCompleted') || getStat(c.statistics, 'lap') || '',
            lapTime: getStat(c.statistics, 'lastLapTime') || getStat(c.statistics, 'fastestLapTime') || '',
            status:  c.status?.type?.name || '',
          };
        }).sort((a, b) => a.rank - b.rank);

        // Meilleur tour
        const fastestLap = riders.reduce((best, r) => {
          if (!r.lapTime || r.lapTime === '—') return best;
          return !best || r.lapTime < best ? r.lapTime : best;
        }, '');

        const leaderName  = riders[0]?.name || '';
        const totalRiders = riders.length;

        // ─── COLONNE GAUCHE : Visuel Circuit ───────────────────────────────────
        // SVG circuit générique avec animation de moto
        const circuitSVG = `
          <svg viewBox="0 0 220 160" width="100%" style="opacity:0.85;max-height:160px;">
            <defs>
              <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff6600" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#ff3300" stop-opacity="0.5"/>
              </linearGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Piste circuit générique -->
            <path id="trackOutline"
              d="M 35 80
                 L 35 45
                 Q 35 20 60 20
                 L 150 20
                 Q 175 20 175 45
                 L 175 65
                 Q 175 85 155 85
                 L 125 85
                 Q 108 85 108 100
                 L 108 115
                 Q 108 130 93 130
                 L 60 130
                 Q 35 130 35 105
                 Z"
              fill="none"
              stroke="rgba(255,255,255,0.12)"
              stroke-width="12"
              stroke-linecap="round"
              stroke-linejoin="round"/>

            <!-- Ligne de piste (orange) -->
            <path
              d="M 35 80
                 L 35 45
                 Q 35 20 60 20
                 L 150 20
                 Q 175 20 175 45
                 L 175 65
                 Q 175 85 155 85
                 L 125 85
                 Q 108 85 108 100
                 L 108 115
                 Q 108 130 93 130
                 L 60 130
                 Q 35 130 35 105
                 Z"
              fill="none"
              stroke="url(#trackGrad)"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"
              filter="url(#glow)"
              stroke-dasharray="800"
              stroke-dashoffset="800"
              style="animation: bikeMove 4s linear infinite;"/>

            <!-- Ligne départ/arrivée -->
            <line x1="33" y1="88" x2="37" y2="72" stroke="white" stroke-width="2" opacity="0.8"/>
            <line x1="33" y1="82" x2="37" y2="82" stroke="white" stroke-width="1" opacity="0.4"/>

            <!-- Numéros de virages -->
            <circle cx="60" cy="20" r="4" fill="rgba(255,102,0,0.6)" opacity="0.7"/>
            <circle cx="175" cy="55" r="4" fill="rgba(255,102,0,0.6)" opacity="0.7"/>
            <circle cx="108" cy="105" r="4" fill="rgba(255,102,0,0.6)" opacity="0.7"/>

            <!-- Moto animée (point lumineux) -->
            <circle r="5" fill="#ff6600" filter="url(#glow)" opacity="0.9">
              <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
                <mpath href="#trackOutline"/>
              </animateMotion>
            </circle>
            <circle r="9" fill="rgba(255,102,0,0.25)" filter="url(#glow)">
              <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
                <mpath href="#trackOutline"/>
              </animateMotion>
            </circle>

            <!-- Label S/F -->
            <text x="40" y="78" font-size="7" fill="white" opacity="0.5" font-family="Roboto,sans-serif">S/F</text>
          </svg>`;

        // ─── COLONNE DROITE : Tableau de timing ────────────────────────────────
        const timingRows = riders.slice(0, 20).map(r => {
          const isFrench  = frenchRiders.some(n => r.name.includes(n));
          const isLeader  = r.rank === 1;
          const gapDisplay= isLeader ? 'LEADER' : (r.gap || '—');
          const lapsDisp  = r.laps || '—';

          const rankColor = r.rank === 1 ? '#ffd700' : r.rank <= 3 ? '#4fc3f7' : 'rgba(255,255,255,0.5)';

          const rowStyle = isFrench
            ? 'background:linear-gradient(90deg,rgba(0,85,164,0.2),rgba(239,65,53,0.12));'
            : '';
          const frFlag = isFrench ? '🇫🇷 ' : '';

          const logoCell = r.logo
            ? `<img src="${r.logo}" width="14" height="14" style="background:white;border-radius:50%;padding:1px;vertical-align:middle;flex-shrink:0;">`
            : '';

          return `
            <tr style="${rowStyle}border-bottom:1px solid rgba(255,255,255,0.04);font-size:11.5px;">
              <td style="width:26px;padding:5px 6px;font-weight:800;color:${rankColor};
                          text-align:center;font-size:12px;">${r.rank}</td>
              <td style="padding:5px 4px;max-width:110px;">
                <div style="display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;">
                  <span style="font-size:11px;">${frFlag}</span>
                  <span style="font-weight:${isFrench ? '800' : '600'};
                               color:${isFrench ? 'white' : 'rgba(255,255,255,0.85)'};
                               overflow:hidden;text-overflow:ellipsis;">${r.name}</span>
                </div>
              </td>
              <td style="padding:5px 3px;text-align:center;">${logoCell}</td>
              <td style="padding:5px 4px;text-align:right;
                         color:${isLeader ? '#ffd700' : 'rgba(255,255,255,0.55)'};
                         font-size:11px;font-weight:${isLeader ? '700' : '400'};
                         font-family:monospace;white-space:nowrap;">
                ${gapDisplay}
              </td>
              <td style="padding:5px 6px;text-align:center;color:rgba(255,255,255,0.4);font-size:11px;">
                ${lapsDisp !== '—' ? lapsDisp : ''}
              </td>
            </tr>`;
        }).join('');

        return `
          <div style="font-family:Roboto,sans-serif;">

            <!-- ═══ HEADER ══════════════════════════════════════════════════════ -->
            <div style="padding:12px 16px;border-bottom:1px solid rgba(255,102,0,0.2);
                        background:linear-gradient(90deg,rgba(255,102,0,0.2),rgba(255,102,0,0.05));">
              <div style="display:flex;align-items:center;justify-content:space-between;">
                <div style="display:flex;align-items:center;gap:10px;">
                  <div style="display:flex;align-items:center;gap:6px;">
                    <div style="width:10px;height:10px;border-radius:50%;background:#ff4a4a;
                                box-shadow:0 0 8px #ff4a4a;animation:livePulse 1.5s infinite;"></div>
                    <span style="font-size:10px;font-weight:800;color:#ff4a4a;
                                 text-transform:uppercase;letter-spacing:1.5px;">EN DIRECT</span>
                  </div>
                  <span style="font-size:16px;font-weight:900;color:white;
                               text-transform:uppercase;letter-spacing:1px;">
                    ${sessionLabel}
                  </span>
                </div>
                <div style="display:flex;align-items:center;gap:16px;">
                  ${period > 0 ? `
                    <div style="text-align:center;">
                      <div style="font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;
                                   letter-spacing:1px;">Tour</div>
                      <div style="font-size:18px;font-weight:900;color:#ff6600;line-height:1;">
                        ${period}
                      </div>
                    </div>` : ''}
                  ${clock ? `
                    <div style="text-align:center;">
                      <div style="font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;
                                   letter-spacing:1px;">Chrono</div>
                      <div style="font-size:14px;font-weight:700;color:white;font-family:monospace;">
                        ${clock}
                      </div>
                    </div>` : ''}
                  ${fastestLap ? `
                    <div style="text-align:center;">
                      <div style="font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;
                                   letter-spacing:1px;">Meilleur tour</div>
                      <div style="font-size:13px;font-weight:700;color:#a855f7;font-family:monospace;">
                        ⚡ ${fastestLap}
                      </div>
                    </div>` : ''}
                </div>
              </div>
            </div>

            <!-- ═══ CORPS : CIRCUIT + TIMING ════════════════════════════════════ -->
            <div style="display:grid;grid-template-columns:200px 1fr;gap:0;">

              <!-- Colonne gauche : Circuit -->
              <div style="padding:12px;border-right:1px solid rgba(255,255,255,0.06);
                          display:flex;flex-direction:column;justify-content:space-between;">
                <!-- Infos GP -->
                <div>
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                    <span style="font-size:22px;">${flag}</span>
                    <div>
                      <div style="font-size:12px;font-weight:800;color:white;
                                   text-transform:uppercase;letter-spacing:0.5px;line-height:1.2;">
                        ${gpName}
                      </div>
                      <div style="font-size:9px;color:rgba(255,255,255,0.4);margin-top:1px;">
                        ${circuit}
                      </div>
                    </div>
                  </div>
                </div>

                <!-- SVG Circuit animé -->
                <div style="flex:1;display:flex;align-items:center;justify-content:center;
                            padding:4px 0;position:relative;">
                  <!-- Scan line effect -->
                  <div style="position:absolute;top:0;left:0;right:0;height:2px;
                              background:linear-gradient(90deg,transparent,rgba(255,102,0,0.4),transparent);
                              animation:scanLine 3s linear infinite;pointer-events:none;"></div>
                  ${circuitSVG}
                </div>

                <!-- Stats circuit -->
                <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:8px;margin-top:4px;">
                  <div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.35);">
                    <span>🏍️ ${totalRiders} pilotes</span>
                    <span>${leaderName ? '🥇 ' + leaderName : ''}</span>
                  </div>
                </div>
              </div>

              <!-- Colonne droite : Tableau de timing -->
              <div style="overflow:hidden;">
                <table width="100%" style="border-collapse:collapse;text-align:left;color:white;font-family:Roboto,sans-serif;">
                  <tr style="border-bottom:2px solid rgba(255,255,255,0.12);font-size:9.5px;
                              text-transform:uppercase;color:rgba(255,255,255,0.35);">
                    <th style="padding:5px 6px;width:26px;text-align:center;">#</th>
                    <th style="padding:5px 4px;">Pilote</th>
                    <th style="padding:5px 3px;width:20px;"></th>
                    <th style="padding:5px 4px;text-align:right;">${isRace ? 'Écart' : isQuali ? 'Temps' : 'Écart'}</th>
                    <th style="padding:5px 6px;text-align:center;width:28px;">${isRace ? 'Tr.' : ''}</th>
                  </tr>
                  ${timingRows || `
                    <tr><td colspan="5" style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:12px;">
                      Données de timing en attente...
                    </td></tr>`}
                </table>
              </div>
            </div>

            <!-- ═══ FOOTER ════════════════════════════════════════════════════════ -->
            <div style="padding:6px 16px;border-top:1px solid rgba(255,255,255,0.06);
                        display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:9px;color:rgba(255,255,255,0.25);text-transform:uppercase;
                           letter-spacing:1px;">ESPN MotoGP · Données live</span>
              <span style="font-size:9px;color:rgba(255,255,255,0.25);">
                🇫🇷 Pilotes français surlignés
              </span>
            </div>

          </div>`;
      ]]]
