  sensor:
    - name: motogp_riders
      value_template: >-
        {%- if value_json is iterable -%}
          {{ value_json | length }} pilotes
        {%- else -%}
          unavailable
        {%- endif -%}
      json_attributes:
        - []
      json_attributes_path: "$"


# ===========================================================================
# 9. CATÉGORIES — UUIDs exposés pour le dashboard
# Endpoint : /categories?seasonYear=2026
# Interval : quotidien
# Usage    : le dashboard JS lit les UUIDs depuis les attributs de ce sensor
#            pour construire les URLs d'historique dynamiquement
# ===========================================================================
- resource: "https://api.motogp.pulselive.com/motogp/v1/categories?seasonYear=2026"
  scan_interval: 86400
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
