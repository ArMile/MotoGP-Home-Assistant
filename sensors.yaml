# ===========================================================================
# 8. PILOTES EN GRILLE — Broadcast API
# Endpoint : /riders  (saison courante uniquement)
# Interval : quotidien
# Usage    : photo, nationalité, équipe, numéro de chaque pilote
# ===========================================================================
