# ===========================================================================
- resource: "https://api.motogp.pulselive.com/motogp/v1/results/standings?seasonUuid=e88b4e43-2209-47aa-8e83-0e0b1cedde6e&categoryUuid=954f7e65-2ef2-4423-b949-4961cc603e45"
